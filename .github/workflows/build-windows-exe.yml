name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Find package.json
        id: find_package
        shell: powershell
        run: |
          $pkg = Get-ChildItem -Path . -Filter package.json -Recurse | Select-Object -First 1
          if (-not $pkg) {
            Write-Error "package.json tidak ditemukan di repository."
            exit 1
          }
          echo "Package found at: $($pkg.FullName)"
          echo "PROJECT_DIR=$($pkg.Directory.FullName)" >> $env:GITHUB_ENV

      - name: Install dependencies
        shell: powershell
        run: |
          cd "$env:PROJECT_DIR"
          npm install

      - name: Build React app
        shell: powershell
        run: |
          cd "$env:PROJECT_DIR"
          npm run build

      - name: Build Windows installer
        shell: powershell
        run: |
          cd "$env:PROJECT_DIR"
          npm run dist

      - name: Find EXE files
        shell: powershell
        run: |
          Get-ChildItem -Path "$env:PROJECT_DIR" -Recurse -Filter *.exe

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aerizen-Asset-Management-Windows-Installer
          path: "**/*.exe"
