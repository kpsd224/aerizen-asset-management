name: Build Aerizen Windows Installer

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-windows:
    # Pin to Windows Server 2022 so GitHub does not show the windows-latest migration notice.
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Smoke test
        run: npm test

      - name: Build Vite app
        run: npm run build

      - name: Build Windows installer
        run: npx electron-builder --win nsis --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE artifacts
        uses: actions/upload-artifact@v6
        with:
          name: aerizen-windows-installer
          path: release/*.exe
